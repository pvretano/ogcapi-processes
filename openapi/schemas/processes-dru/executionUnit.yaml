oneOf:
  - description: |-
      The execution unit is a DOCKER or OCI container.
    type: object
    required:
      - type
      - value
    properties:
      type:
        enum:
        - docker
        - oci
      value:
        $ref: executionUnitContainer.yaml
    additionalProperties: false
  - allOf:
      - description: |-
          The execution unit is a CWL script.  The CWL script can be directly
          encoded into the execution unit as a JSON object OR the CWL script 
          can be referenced via a "link" OR the CWL script can be encoded as
          a string and included as the content of the "value" property.  In
          this case, the "mediaType" property must also be specified indicating
          the RFC 2046 media type of the content of the "value" property.
        type: object
        required: type
        properties:
          type:
            enum:
            - cwl
      - oneOf:
        - type: object
          required: value
          properties:
            value:
              - $ref: "https://raw.githubusercontent.com/common-workflow-language/cwl-v1.2/main/json-schema/cwl.yaml"
          additionalProperties: false
        - type: object
          required:
            - value
            - mediaType
          properties:
            mediaType:
              description: |-
                Indicates the RFC 2046 media type of the content of "value".
              type: string
            value:
              description: |-
                The content of the "value" string is a CWL script encoded as a
                JSON or YAML string.
              type: string
        - type: object
          required: link
          properties:
            link:
              - $ref: "link.yaml"
          additionalProperties: false
  - allOf:
      - description: |-
          The execution unit is something other than a container or CWL script.
          This Standard allows other types of execution units (e.g. Python) but
          does not provide details about their use.  The specific details of the
          execution unit can be included inline or referenced via a link.  For
          inline inclusion, the details of the execution unit may be embedded 
          as a JSON object or encoded as the content of a string.  In this later
          case of a string, the "mediaType" property may be used to indicated
          the RFC 2046 media type of the contents of the "value" string.
        type: object
        required: type
        properties:
          type:
            type: string
      - oneOf:
        - type: object
          required: value
          properties:
            value:
              type: object
          additionalProperties: true
        - type: object
          required: value
          properties:
            mediaType:
              type: string
            value:
              type: string
        - type: object
          required: link
          properties:
            link:
              - $ref: "link.yaml"
          additionalProperties: false
